name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: common-cloud-controls/delivery-toolkit
          ref: main
          path: toolkit

      - uses: actions/setup-go@v6
        with:
          go-version-file: toolkit/go.mod
          cache-dependency-path: toolkit/go.sum

      - name: Build ccc
        run: go build -o "$GITHUB_WORKSPACE/ccc" .
        working-directory: toolkit

      - name: Validate all catalogs
        run: |
          failed=0
          for f in $(find . -name "threats.yaml" -not -path "./toolkit/*"); do
            dir=$(dirname "$f")
            path="${dir#./}"
            title=$(basename "$path")
            echo "=== Validating $path ==="
            if "$GITHUB_WORKSPACE/ccc" generate threats "$path" "$title" \
                --threats-dir "." \
                --tag validate \
                --output-dir /tmp/validate-out; then
              echo "  OK"
            else
              echo "  FAILED"
              failed=1
            fi
          done
          exit $failed
